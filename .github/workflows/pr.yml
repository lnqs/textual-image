name: Check PR

on:
  pull_request:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Check
      uses: ./.github/actions/check
      with:
        python-version: ${{ matrix.python-version }}
        run-format: ${{ matrix.python-version == '3.14' }}
        run-lint: ${{ matrix.python-version == '3.14' }}
        run-spell-check: ${{ matrix.python-version == '3.14' }}
        run-types: ${{ matrix.python-version == '3.14' }}
        run-rich-only: ${{ matrix.python-version == '3.14' }}
        run-tests: "true"

  commits:
    name: Conventional commits
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0

    - name: Validate commit messages
      run: |
        uv sync --locked --no-install-project
        uv run cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.sha }}"

  pr-title:
    name: Conventional PR title
    runs-on: ubuntu-latest

    steps:
    - uses: amannn/action-semantic-pull-request@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, commits, pr-title]

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      uses: ./.github/actions/build
