name: Check PR

on:
  pull_request:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Check
      uses: ./.github/actions/check
      with:
        python-version: ${{ matrix.python-version }}
        run-format: ${{ matrix.python-version == '3.14' }}
        run-lint: ${{ matrix.python-version == '3.14' }}
        run-spell-check: ${{ matrix.python-version == '3.14' }}
        run-types: ${{ matrix.python-version == '3.14' }}
        run-rich-only: ${{ matrix.python-version == '3.14' }}
        run-tests: "true"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build
      uses: ./.github/actions/build
