name: Build and publish

on:
  push:
    branches: [main]

jobs:
  check:
    name: Check
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Check
      uses: ./.github/actions/check
      with:
        python-version: ${{ matrix.python-version }}
        run-format: ${{ matrix.python-version == '3.14' }}
        run-lint: ${{ matrix.python-version == '3.14' }}
        run-spell-check: ${{ matrix.python-version == '3.14' }}
        run-types: ${{ matrix.python-version == '3.14' }}
        run-rich-only: ${{ matrix.python-version == '3.14' }}
        run-tests: "true"

  commits:
    name: Conventional commits
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0

    - name: Validate commit messages
      run: |
        uv sync --locked --no-install-project
        uv run cz check --rev-range "${{ github.event.before }}..${{ github.sha }}"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, commits]

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      uses: ./.github/actions/build

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      pull-requests: write

    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}

    steps:
    - uses: googleapis/release-please-action@v5
      id: release-please
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        release-type: python

  publish:
    name: Publish
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/textual-image

    permissions:
      id-token: write

    steps:
    - name: Download distribution packages
      uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1
