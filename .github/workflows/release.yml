name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync to triggering commit
      run: git reset --hard "${{ github.event.workflow_run.head_sha }}"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Release
      env:
        CZ_NON_INTERACTIVE: "1"
      run: |
        uv sync --locked --no-install-project

        version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")

        if ! git rev-parse "v${version}" >/dev/null 2>&1; then
          echo "Tagging v${version} for current release"
          git tag "v${version}"
          git push origin "v${version}"
          exit 0
        fi

        set +e
        uv run cz bump --check
        check_code=$?
        set -e

        if [ "$check_code" -ne 0 ]; then
          echo "No release needed (exit ${check_code})"
          exit 0
        fi

        uv run cz bump --yes --changelog
        uv lock
        git add uv.lock
        if ! git diff --staged --quiet; then
          git commit --amend --no-edit
        fi
        git push origin main --follow-tags
