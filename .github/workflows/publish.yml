name: Publish

on:
  push:
    tags:
      - v*

permissions:
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/textual-image

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true

    - name: Build
      run: uv build

    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1
